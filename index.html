<!DOCTYPE html>
<html>
<head>
    <title>PRUEBA V5</title>
    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js"></script>
</head>
<body>

    <h1>PRUEBA DE CONEXIÓN V5</h1>
    <p>Si ves esto, la página actualizó.</p>
    
    <button id="test-btn" style="padding: 20px; font-size: 20px;">
        PROBAR LLAMADA
    </button>

    <script>
        const btn = document.getElementById('test-btn');

        btn.addEventListener('click', () => {
            // Buscamos a Vapi en el navegador
            const VapiSDK = window.Vapi || (window.vapiSDK ? window.vapiSDK.Vapi : null);

            if (VapiSDK) {
                const vapi = new VapiSDK('940cb800-d888-4be6-92c7-e8fb0b6ddfd');
                
                vapi.start({
                    assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716"
                });

                btn.innerText = "CONECTANDO...";
            } else {
                alert("ERROR: El navegador no cargó el archivo de Vapi. Probá con datos móviles.");
            }
        });
    </script>

</body>
</html>
