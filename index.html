<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Irina V12 - Archivo Local</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="vapi.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; padding-top:50px; background:#f0f2f5;">

    <div style="background:white; display:inline-block; padding:30px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); max-width: 90%;">
        <h1 style="color:#1a73e8;">Irina Hire</h1>
        <p style="background: #000; color: #fff; padding: 5px 15px; display: inline-block; font-weight: bold; border-radius: 5px;">SISTEMA: V12</p>
        
        <p>Carga de motor: <b>Local (GitHub)</b></p>
        
        <button id="btn" style="padding:20px; font-size:18px; background:#28a745; color:white; border:none; border-radius:50px; cursor:pointer; width: 100%; font-weight: bold;">
            🚀 INICIAR ENTREVISTA V12
        </button>
        
        <p id="status" style="margin-top:20px; color:#666;">Estado: Listo</p>
    </div>

    <script>
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      btn.onclick = function() {
        // Buscamos la clase Vapi que cargó desde tu archivo local
        const SDK = window.Vapi;

        if (SDK) {
            status.innerText = "Estado: Conectando...";
            try {
                const vapi = new SDK("940cb800-d888-4be6-92c7-e8fb0b6ddfd");
                
                vapi.start({
                    assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716"
                });

                vapi.on('call-start', () => {
                    status.innerText = "Estado: EN LLAMADA";
                    btn.style.background = "#dc3545";
                    btn.innerText = "🔴 AL AIRE";
                });

                vapi.on('error', (e) => {
                    alert("Vapi dice: " + e.message);
                    status.innerText = "Estado: Error de conexión";
                });
            } catch (err) {
                alert("Error de inicio: " + err.message);
            }
        } else {
            alert("V12: GitHub no encontró el archivo vapi.js. Verificá que el nombre esté bien escrito.");
        }
      };
    </script>

</body>
</html>
