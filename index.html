<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación - Irina AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        h1 { color: #1a73e8; font-size: 22px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #vapi-btn { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Proceso de Selección</h1>
        <p>Ingresá tu DNI para hablar con Irina.</p>
        <input type="number" id="dniInput" placeholder="Número de documento">
        <button id="vapi-btn">📞 Iniciar Llamada</button>
    </div>

    <script src="https://cdn.vapi.ai/vapi.js"></script>

    <script>
        const vapi = new Vapi('940cb800-d888-4be6-92c7-e8fb0b6ddfd');

        const btn = document.getElementById('vapi-btn');
        const inputDni = document.getElementById('dniInput');

        btn.addEventListener('click', () => {
            const dni = inputDni.value;
            
            if(!dni) {
                alert("Por favor, ingresá tu DNI");
                return;
            }

            console.log("Llamando a Irina con DNI:", dni);

            vapi.start({
                assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716",
                assistantOverrides: {
                    variableValues: {
                        dni: dni
                    }
                }
            });
        });

        vapi.on('call-start', () => console.log('Llamada iniciada'));
        vapi.on('error', (e) => console.error('Error de Vapi:', e));
    </script>
</body>
</html>
