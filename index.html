<!DOCTYPE html>
<html>
<head>
    <title>Prueba Irina V7</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f9;">

    <h1>Irina Hire V7</h1>
    <p>Si ves V7, el código cargó.</p>

    <button id="vapi-btn" style="padding: 20px 40px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(40,167,69,0.3);">
        📞 INICIAR ENTREVISTA
    </button>

    <script>
        const btn = document.getElementById('vapi-btn');
        let vapi = null;

        btn.addEventListener('click', () => {
            // Buscamos el SDK
            const VapiSDK = window.Vapi || (window.vapiSDK ? window.vapiSDK.Vapi : null);

            if (VapiSDK) {
                if (!vapi) {
                    // IMPORTANTE: Verificá que esta Key sea EXACTAMENTE la del panel
                    vapi = new VapiSDK('940cb800-d888-4be6-92c7-e8fb0b6ddfd');
                }

                btn.innerText = "CONECTANDO...";
                
                vapi.start({
                    assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716"
                });

                vapi.on('call-start', () => {
                    btn.innerText = "EN LLAMADA";
                    btn.style.background = "#dc3545";
                });

                vapi.on('error', (e) => {
                    console.error(e);
                    alert("Error de conexión. Intentá permitir cookies o usar Chrome.");
                    btn.innerText = "REINTENTAR";
                });
            } else {
                alert("El motor de voz no cargó. Refrescá la página.");
            }
        });
    </script>
</body>
</html>
