<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación - Irina AI</title>
    
    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #vapi-btn { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Irina Hire</h2>
        <input type="number" id="dniInput" placeholder="Tu DNI">
        <button id="vapi-btn">📞 Iniciar Llamada</button>
    </div>

    <script>
      const btn = document.getElementById('vapi-btn');
      
      btn.addEventListener('click', () => {
        const dniVal = document.getElementById('dniInput').value;
        if (!dniVal) { alert("Poné tu DNI"); return; }

        // BUSQUEDA TRIPLE: Intentamos encontrar a Vapi como sea
        const VapiSDK = window.Vapi || (window.vapiSDK ? window.vapiSDK.Vapi : null);

        if (VapiSDK) {
            try {
                const vapi = new VapiSDK('940cb800-d888-4be6-92c7-e8fb0b6ddfd');
                vapi.start({
                    assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716",
                    assistantOverrides: { variableValues: { dni: dniVal } }
                });
                btn.innerText = "Conectando...";
                btn.style.background = "#34a853";
            } catch (err) {
                alert("Error al iniciar: " + err.message);
            }
        } else {
            alert("El motor de voz aún no baja de internet. Por favor, esperá 10 segundos con la página abierta e intentalo de nuevo.");
            // Forzamos una recarga del script si falló
            const s = document.createElement('script');
            s.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            document.head.appendChild(s);
        }
      });
    </script>
</body>
</html>
