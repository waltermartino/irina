<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación - Irina AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        h1 { color: #1a73e8; font-size: 22px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Proceso de Selección</h1>
        <p>Ingresá tu DNI para hablar con Irina.</p>
        <input type="number" id="dniInput" placeholder="Número de documento">
        <button id="vapi-btn">📞 Iniciar Llamada</button>
    </div>

    <script>
      var vapiInstance = null;

      // MÉTODO DE CARGA SEGÚN EL MANUAL DE VAPI
      (function (d, t) {
        var g = d.createElement(t),
            s = d.getElementsByTagName(t)[0];
        g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g, s);

        g.onload = function () {
          console.log("Vapi cargado correctamente");
          // CORRECCIÓN SEGÚN MANUAL: Acceso vía window.vapiSDK
          if (window.vapiSDK && window.vapiSDK.Vapi) {
              vapiInstance = new window.vapiSDK.Vapi('940cb800-d888-4be6-92c7-e8fb0b6ddfd');
              console.log("Instancia de Vapi lista");
          }
        };
      })(document, "script");

      document.getElementById('vapi-btn').addEventListener('click', () => {
        const dniVal = document.getElementById('dniInput').value;
        
        if (!dniVal) {
          alert("Por favor, ingresá tu DNI.");
          return;
        }

        if (!vapiInstance) {
          alert("La conexión todavía se está estableciendo. Esperá 5 segundos y reintentá.");
          return;
        }

        console.log("Iniciando llamada con DNI:", dniVal);
        
        vapiInstance.start({
          assistantId: "af7a436b-5ca5-443d-9c37-adeb7832b716",
          assistantOverrides: {
            variableValues: { dni: dniVal }
          }
        });
      });
    </script>
</body>
</html>
